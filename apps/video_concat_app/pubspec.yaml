name: video_concat_app
description: 视频合并工具
publish_to: 'none'
version: 2.2.0+8

environment:
  sdk: ^3.10.7

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # 状态管理
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  # 路由
  go_router: ^17.1.0
  # 持久化
  shared_preferences: ^2.5.3
  # 文件选择与拖放
  file_picker: ^10.1.10
  desktop_drop: ^0.7.0
  # freezed
  freezed_annotation: ^3.0.0
  # 视频播放
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  media_kit_native_event_loop: ^1.0.1
  # 内部模块
  ffmpeg_kit: ^1.0.0
  # 日志
  logger: ^2.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # 代码生成
  build_runner: ^2.4.15
  riverpod_generator: ^4.0.0
  freezed: ^3.0.6

flutter:
  uses-material-design: true
